version: '3.8'

services:
  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=AuthCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    entrypoint: ["cqlsh", "cassandra", "-e", "CREATE KEYSPACE IF NOT EXISTS user_auth WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"]
    depends_on:
      cassandra:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      - SPRING_PROFILES_ACTIVE=docker
